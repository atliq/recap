<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECAP - Knowledge Graph</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="newtab.css">
    <!-- Load 3d-force-graph locally to bypass CSP -->
    <script src="lib/3d-force-graph.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* paper backdrop provided by theme.css; scene canvas covers it */
        }

        #3d-graph {
            width: 100vw;
            height: 100vh;
        }

        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
            background: var(--card);
            border: 1px solid var(--line);
            color: var(--ink-2);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background var(--transition), color var(--transition), border-color var(--transition);
            text-decoration: none;
        }

        .back-btn:hover {
            border-color: var(--teal);
            color: var(--teal-deep);
            text-decoration: none;
        }

        .graph-panel {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
            background: var(--card);
            border: 1px solid var(--line-soft);
            border-radius: var(--radius);
            padding: 24px;
            width: 320px;
            color: var(--ink);
            font-family: var(--sans);
            display: none;
            box-shadow: 0 4px 18px rgba(22, 32, 43, 0.10);
        }

        /* teal filing-tab on the info panel */
        .graph-panel::before {
            content: "";
            position: absolute;
            top: -1px;
            left: 20px;
            width: 44px;
            height: 5px;
            background: var(--teal);
            border-radius: 0 0 4px 4px;
        }

        .graph-panel.visible {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fade-in 0.3s ease;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .node-title {
            font-family: var(--sans);
            font-size: 18px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 4px;
        }

        .node-type {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.6px;
            color: var(--teal-deep);
        }

        .node-connections {
            font-family: var(--mono);
            margin-top: 16px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .node-connection-item {
            font-family: var(--sans);
            font-size: 13px;
            letter-spacing: 0;
            text-transform: none;
            color: var(--ink-2);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            padding: 8px;
            background: var(--card-2);
            border-radius: var(--radius-sm);
            border: 1px solid var(--line-soft);
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            color: var(--muted);
        }
    </style>
</head>

<body>

    <a href="newtab.html" class="back-btn">
        <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
            </path>
        </svg>
        Back to Dashboard
    </a>

    <div id="loading" class="loader">Building your brain...</div>
    <div id="3d-graph"></div>

    <div id="info-panel" class="graph-panel">
        <div>
            <div id="panel-type" class="node-type">Entity</div>
            <div id="panel-title" class="node-title">Concept Name</div>
        </div>
        <div id="panel-connections" class="node-connections">
            Connected to:
        </div>
    </div>

    <script src="graph.js"></script>
</body>

</html>
