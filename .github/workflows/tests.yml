name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run integration suite
        run: uv run python tests/test_integration.py
